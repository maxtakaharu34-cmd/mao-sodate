<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
    <meta name="theme-color" content="#0a0010" />
    <title>魔王そだて</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Mochiy+Pop+P+One&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0010;
        --bg-grad-1: #1a0040;
        --bg-grad-2: #40002a;
        --paper: #fff;
        --ink: #0a0a0a;
        --red: #e8133a;
        --purple: #8b1aff;
        --gold: #ffd700;
        --blood: #9b0020;
        --ghost: #b388ff;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: "DotGothic16", "Mochiy Pop P One", sans-serif;
        font-weight: 400;
        color: #fff;
        background:
          radial-gradient(800px 600px at 10% 10%, rgba(139, 26, 255, 0.35), transparent 60%),
          radial-gradient(800px 600px at 90% 95%, rgba(232, 19, 58, 0.25), transparent 60%),
          radial-gradient(600px 400px at 70% 20%, rgba(155, 0, 32, 0.25), transparent 60%),
          var(--bg);
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      /* Swirling dark fog */
      body::before {
        content: "";
        position: fixed;
        inset: -20%;
        background:
          radial-gradient(400px 300px at 20% 20%, rgba(90, 0, 150, 0.15), transparent 70%),
          radial-gradient(400px 300px at 80% 70%, rgba(150, 0, 50, 0.15), transparent 70%);
        filter: blur(20px);
        animation: fog 14s ease-in-out infinite alternate;
        pointer-events: none;
        z-index: 0;
      }
      @keyframes fog {
        from { transform: translate(-3%, -2%) scale(1); }
        to   { transform: translate(3%, 2%) scale(1.08); }
      }
      #app {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-rows: auto 1fr auto auto;
        height: 100dvh;
        max-height: 100dvh;
        padding: 10px 14px 10px;
        gap: 8px;
        max-width: 520px;
        margin: 0 auto;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .title {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(20px, 5vw, 26px);
        color: var(--gold);
        -webkit-text-stroke: 3px #000;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 var(--blood), 5px 5px 0 #000;
        transform: rotate(-2deg);
        margin: 0;
        letter-spacing: 0.03em;
      }
      .top-buttons { display: flex; gap: 5px; }
      .icon-btn {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(255,255,255,0.2);
        color: #fff;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .icon-btn:active { background: rgba(255,255,255,0.25); }

      /* Stats bar */
      .stats {
        background: rgba(0,0,0,0.4);
        border: 2px solid rgba(255,215,0,0.3);
        border-radius: 14px;
        padding: 10px 12px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
      }
      .stats .level {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 28px;
        color: var(--gold);
        -webkit-text-stroke: 2px #000;
        paint-order: stroke fill;
        text-shadow: 2px 2px 0 var(--blood);
        line-height: 1;
      }
      .stats .level-label { font-size: 9px; color: var(--ghost); letter-spacing: 0.1em; }
      .stats .exp-wrap {
        height: 10px;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 999px;
        overflow: hidden;
      }
      .stats .exp-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--purple), var(--gold));
        transition: width 0.3s;
      }
      .stats .name {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 15px;
        color: #fff;
        text-shadow: 2px 2px 0 #000;
        text-align: right;
        white-space: nowrap;
      }
      .gauges {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
      }
      .gauge {
        background: rgba(0,0,0,0.4);
        border: 2px solid rgba(255,255,255,0.15);
        border-radius: 10px;
        padding: 5px 8px;
      }
      .gauge-label {
        font-size: 10px;
        color: var(--ghost);
        letter-spacing: 0.1em;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      .gauge-value {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 14px;
        color: #fff;
      }
      .gauge-track {
        height: 6px;
        background: rgba(255,255,255,0.1);
        border-radius: 999px;
        overflow: hidden;
        margin-top: 3px;
      }
      .gauge-fill {
        height: 100%;
        border-radius: 999px;
        transition: width 0.3s, background 0.3s;
      }
      .gauge.hunger .gauge-fill { background: linear-gradient(90deg, #ff9800, #ff4d4d); }
      .gauge.mood .gauge-fill   { background: linear-gradient(90deg, #ff4da6, #ffd700); }
      .gauge.age .gauge-fill    { background: linear-gradient(90deg, #5ac8fa, #b388ff); }

      /* Stage (monster canvas) */
      .stage {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
        background:
          radial-gradient(60% 45% at 50% 90%, rgba(155, 0, 32, 0.4) 0%, transparent 70%),
          radial-gradient(40% 30% at 50% 60%, rgba(139, 26, 255, 0.25) 0%, transparent 70%),
          linear-gradient(180deg, rgba(0,0,0,0.3), rgba(0,0,0,0.6));
        border: 3px solid rgba(255,215,0,0.4);
        border-radius: 18px;
        box-shadow:
          0 0 40px rgba(139, 26, 255, 0.25) inset,
          4px 4px 0 rgba(0,0,0,0.5);
        overflow: hidden;
      }
      /* Stars */
      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(1px 1px at 20% 30%, #fff 50%, transparent),
          radial-gradient(1px 1px at 60% 70%, #fff 50%, transparent),
          radial-gradient(1px 1px at 80% 20%, #fff 50%, transparent),
          radial-gradient(1px 1px at 40% 85%, #fff 50%, transparent),
          radial-gradient(1.5px 1.5px at 15% 55%, #fff 50%, transparent);
        background-size: 300px 300px;
        opacity: 0.5;
        animation: starDrift 40s linear infinite;
      }
      @keyframes starDrift {
        0% { background-position: 0 0; }
        100% { background-position: 300px 300px; }
      }
      .monster-wrap {
        position: relative;
        z-index: 2;
        width: 78%;
        max-width: 320px;
        aspect-ratio: 1;
        animation: breathe 2.6s ease-in-out infinite;
      }
      .monster-wrap.happy {
        animation: bounce 0.9s ease-in-out infinite;
      }
      .monster-wrap.grumpy {
        animation: grump 1.8s ease-in-out infinite;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1) translateY(0); }
        50%      { transform: scale(1.03) translateY(-6px); }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-14px); }
      }
      @keyframes grump {
        0%, 100% { transform: translateX(0) rotate(0); }
        25%      { transform: translateX(-4px) rotate(-1deg); }
        75%      { transform: translateX(4px) rotate(1deg); }
      }
      #monster { width: 100%; height: 100%; display: block; }

      /* Speech bubble */
      .bubble {
        position: absolute;
        top: 10%;
        left: 50%;
        transform: translateX(-50%) scale(0.9);
        background: rgba(255,255,255,0.95);
        color: #1a0040;
        padding: 6px 14px;
        border-radius: 999px;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 13px;
        border: 2px solid #000;
        box-shadow: 2px 2px 0 #000;
        opacity: 0;
        transition: opacity 0.2s, transform 0.2s;
        pointer-events: none;
        white-space: nowrap;
        z-index: 3;
      }
      .bubble.show {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
      .bubble::after {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        border: 5px solid transparent;
        border-top-color: #000;
      }

      /* Action buttons */
      .actions {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }
      .act-btn {
        background: rgba(0,0,0,0.5);
        border: 2.5px solid var(--gold);
        color: #fff;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 15px;
        padding: 13px 6px;
        border-radius: 14px;
        cursor: pointer;
        box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: transform 0.05s, background 0.15s;
        min-height: 54px;
      }
      .act-btn:active {
        transform: translate(2px, 2px);
        box-shadow: 1px 1px 0 rgba(0,0,0,0.5);
      }
      .act-btn .ico { font-size: 22px; }
      .act-btn.eat    { border-color: #ff9800; }
      .act-btn.play   { border-color: var(--ghost); }
      .act-btn.train  { border-color: var(--red); }
      .act-btn.praise { border-color: var(--gold); }

      /* Bottom row: share / rename */
      .bottom-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .mini-btn {
        background: rgba(255,255,255,0.08);
        border: 2px solid rgba(255,255,255,0.15);
        color: #fff;
        font-family: "DotGothic16", sans-serif;
        font-size: 12px;
        padding: 8px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .mini-btn:active { background: rgba(255,255,255,0.18); }

      /* Floating numbers */
      #floaters {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 4;
      }
      .floater {
        position: absolute;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 24px;
        color: var(--gold);
        -webkit-text-stroke: 2px #000;
        paint-order: stroke fill;
        text-shadow: 2px 2px 0 var(--blood);
        transform: translate(-50%, -50%);
        animation: floatUp 1.1s ease-out forwards;
        white-space: nowrap;
      }
      .floater.exp  { color: var(--gold); }
      .floater.love { color: #ff4da6; }
      .floater.food { color: #ff9800; }
      .floater.bad  { color: #888; }
      @keyframes floatUp {
        0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
        20%  { opacity: 1; transform: translate(-50%, -75%) scale(1.1); }
        100% { opacity: 0; transform: translate(-50%, -160%) scale(0.9); }
      }

      /* Level-up overlay */
      #levelup {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
      }
      #levelup.show {
        animation: levelupPulse 1.6s ease-out forwards;
      }
      @keyframes levelupPulse {
        0%   { opacity: 0; }
        20%  { opacity: 1; }
        100% { opacity: 0; }
      }
      #levelup .flash {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 50%, rgba(255,215,0,0.7), rgba(139,26,255,0.3) 40%, transparent 70%);
      }
      #levelup .text {
        position: relative;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(28px, 9vw, 52px);
        color: var(--gold);
        -webkit-text-stroke: 4px #000;
        paint-order: stroke fill;
        text-shadow: 4px 4px 0 var(--blood), 7px 7px 0 #000;
        transform: rotate(-3deg);
        animation: levelupText 1.6s cubic-bezier(.2,.9,.2,1);
      }
      @keyframes levelupText {
        0%   { transform: scale(0.3) rotate(-15deg); opacity: 0; }
        20%  { transform: scale(1.25) rotate(6deg); opacity: 1; }
        40%  { transform: scale(0.95) rotate(-3deg); }
        100% { transform: scale(1) rotate(-3deg); opacity: 0; }
      }

      /* Evolution overlay */
      #evolve {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 6;
        opacity: 0;
      }
      #evolve.show {
        animation: evolveBg 2.4s ease-out forwards;
      }
      #evolve .stripes {
        position: absolute;
        left: -120%;
        top: 0;
        width: 240%;
        height: 100%;
        background: repeating-linear-gradient(
          -15deg,
          rgba(255, 215, 0, 0.5) 0 40px,
          rgba(139, 26, 255, 0.35) 40px 80px,
          rgba(232, 19, 58, 0.5) 80px 120px
        );
        transform: skewX(-8deg);
        opacity: 0;
      }
      #evolve.show .stripes {
        animation: stripesSweep 2.2s cubic-bezier(.2,.7,.2,1) forwards;
      }
      #evolve .text {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(32px, 10vw, 60px);
        color: #fff;
        -webkit-text-stroke: 5px #000;
        paint-order: stroke fill;
        text-shadow: 4px 4px 0 var(--red), 8px 8px 0 #000;
        letter-spacing: 0.02em;
        opacity: 0;
      }
      #evolve.show .text {
        animation: evolveText 2s cubic-bezier(.2,.9,.2,1) forwards;
      }
      @keyframes evolveBg {
        0%   { opacity: 0; }
        15%  { opacity: 1; }
        85%  { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes stripesSweep {
        0%   { left: -120%; opacity: 0; }
        15%  { opacity: 1; }
        85%  { opacity: 1; }
        100% { left: 120%; opacity: 0; }
      }
      @keyframes evolveText {
        0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
        20%  { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        40%  { transform: translate(-50%, -50%) scale(0.95); }
        90%  { opacity: 1; }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
      }

      /* Start overlay */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.92);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 24px;
      }
      .overlay.show { display: flex; }
      .overlay .box {
        background: var(--paper);
        color: #000;
        border: 4px solid #000;
        border-radius: 18px;
        padding: 24px 26px;
        text-align: center;
        box-shadow: 6px 6px 0 var(--blood);
        transform: rotate(-1deg);
        max-width: 340px;
      }
      .overlay h2 {
        font-family: "Mochiy Pop P One", sans-serif;
        margin: 0 0 6px;
        font-size: 28px;
        color: var(--blood);
        -webkit-text-stroke: 3px #000;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 #000;
      }
      .overlay p { font-size: 13px; margin: 6px 0; line-height: 1.5; }
      .overlay input {
        width: 100%;
        font-size: 18px;
        font-family: "Mochiy Pop P One", sans-serif;
        text-align: center;
        border: 3px solid #000;
        border-radius: 10px;
        padding: 10px;
        margin: 12px 0;
      }
      .overlay button {
        background: var(--blood);
        color: #fff;
        border: 3px solid #000;
        border-radius: 999px;
        padding: 12px 28px;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 18px;
        cursor: pointer;
        box-shadow: 4px 4px 0 #000;
        animation: btnPulse 1.4s ease-in-out infinite;
      }
      .overlay button:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0 #000;
      }
      @keyframes btnPulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.05); }
      }

      /* Death overlay */
      .death-box {
        background: #000 !important;
        color: #fff !important;
        border-color: var(--red) !important;
        box-shadow: 6px 6px 0 var(--red) !important;
      }
      .death-box h2 {
        color: var(--red) !important;
      }
      .death-box p { color: #ddd; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1 class="title">魔王そだて</h1>
        <div class="top-buttons">
          <button id="btn-mute" class="icon-btn" aria-label="mute">🔊</button>
          <button id="btn-reset" class="icon-btn" aria-label="reset">↺</button>
        </div>
      </header>

      <div class="stage">
        <div class="monster-wrap" id="monster-wrap">
          <svg id="monster" viewBox="0 0 200 200"></svg>
        </div>
        <div class="bubble" id="bubble"></div>
        <div id="floaters"></div>
        <div id="levelup"><div class="flash"></div><div class="text">LEVEL UP!</div></div>
        <div id="evolve"><div class="stripes"></div><div class="text" id="evolve-text">進化！</div></div>
      </div>

      <div class="stats">
        <div>
          <div class="level-label">LV</div>
          <div class="level" id="lv">1</div>
        </div>
        <div>
          <div class="exp-wrap"><div class="exp-bar" id="exp-bar" style="width:0%"></div></div>
          <div class="gauges" style="margin-top:8px">
            <div class="gauge hunger">
              <div class="gauge-label">食欲 <span class="gauge-value" id="hunger-val">50</span></div>
              <div class="gauge-track"><div class="gauge-fill" id="hunger-bar" style="width:50%"></div></div>
            </div>
            <div class="gauge mood">
              <div class="gauge-label">機嫌 <span class="gauge-value" id="mood-val">80</span></div>
              <div class="gauge-track"><div class="gauge-fill" id="mood-bar" style="width:80%"></div></div>
            </div>
            <div class="gauge age">
              <div class="gauge-label">日数 <span class="gauge-value" id="age-val">0</span></div>
              <div class="gauge-track"><div class="gauge-fill" id="age-bar" style="width:0%"></div></div>
            </div>
          </div>
        </div>
        <div>
          <div class="level-label">NAME</div>
          <div class="name" id="name">—</div>
        </div>
      </div>

      <div class="actions">
        <button class="act-btn eat"    data-act="eat"><span class="ico">🍖</span>えさ</button>
        <button class="act-btn play"   data-act="play"><span class="ico">🎲</span>あそぶ</button>
        <button class="act-btn train"  data-act="train"><span class="ico">⚔️</span>きたえる</button>
        <button class="act-btn praise" data-act="praise"><span class="ico">✨</span>ほめる</button>
      </div>

      <div class="bottom-row">
        <button class="mini-btn" id="btn-rename">🪶 名前を変える</button>
        <button class="mini-btn" id="btn-share">🔗 シェアする</button>
      </div>
    </div>

    <!-- Start overlay -->
    <div class="overlay" id="start-overlay">
      <div class="box">
        <h2>魔王そだて</h2>
        <p>卵から魔王を育てるんだ。<br/>えさ・あそぶ・きたえる・ほめる、の4操作。<br/>大きな悪になれるか？</p>
        <input id="start-name" maxlength="10" placeholder="魔王の名前" value="ダーク" />
        <br/>
        <button id="btn-start">育てはじめる</button>
      </div>
    </div>

    <!-- Death overlay -->
    <div class="overlay" id="death-overlay">
      <div class="box death-box">
        <h2>魔王は消えた…</h2>
        <p id="death-msg">食欲 0 で散った。もう一度挑戦するか？</p>
        <button id="btn-restart">新しい魔王を育てる</button>
      </div>
    </div>

    <script src="mao.js" defer></script>
  </body>
</html>
